<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pretest - Fourier's Law of Heat Conduction</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        :root {
            --primary: #3498db;
            --secondary: #2c3e50;
            --success: #2ecc71;
            --wrong: #e74c3c;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: #ffffff;
            --text-main: #34495e;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .back-btn {
            text-decoration: none;
            color: var(--primary);
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 25px;
            transition: transform 0.2s;
        }

        .back-btn:hover {
            transform: translateX(-5px);
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInUp 0.8s ease-out;
        }

        header h1 {
            color: var(--secondary);
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        .quiz-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            margin-bottom: 25px;
            animation: fadeInUp 0.6s ease-out backwards;
            transition: transform 0.3s ease;
        }

        .quiz-card:hover {
            transform: translateY(-5px);
        }

        .question {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--secondary);
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
        }

        .q-num {
            color: var(--primary);
            font-weight: 800;
        }

        .options-list {
            list-style: none;
            padding: 0;
            display: grid;
            gap: 12px;
        }

        .option-btn {
            width: 100%;
            text-align: left;
            padding: 15px 20px;
            border: 2px solid #edf2f7;
            border-radius: 12px;
            background: #f8fbfe;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1rem;
            color: var(--text-main);
            font-weight: 500;
        }

        .option-btn:hover:not([disabled]) {
            border-color: var(--primary);
            background: white;
            transform: scale(1.01);
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.1);
        }

        .correct {
            background-color: var(--success) !important;
            color: white !important;
            border-color: var(--success) !important;
            animation: pop 0.4s ease;
        }

        .wrong {
            background-color: var(--wrong) !important;
            color: white !important;
            border-color: var(--wrong) !important;
        }

        .btn-submit {
            display: block;
            width: 100%;
            padding: 18px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin: 30px 0;
            box-shadow: 0 8px 20px rgba(52, 152, 219, 0.3);
            transition: all 0.3s;
        }

        .btn-submit:hover {
            background: var(--secondary);
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.15);
        }

        #result-modal {
            display: none;
            text-align: center;
            padding: 50px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.2);
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #result-title {
            font-size: 2.5rem;
            color: var(--secondary);
            margin-top: 0;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 800;
            margin: 20px auto;
            box-shadow: 0 10px 20px rgba(52, 152, 219, 0.4);
        }

        /* Staggered load animation delays */
        .q-1 { animation-delay: 0.1s; }
        .q-2 { animation-delay: 0.2s; }
        .q-3 { animation-delay: 0.3s; }
        /* ... can add more or use JS to inject delay ... */

    </style>
</head>
<body>

<div class="container">
    <a href="project.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Lab</a>
    
    <header id="quiz-header">
        <h1><i class="fas fa-tasks" style="color: var(--primary); margin-right: 10px;"></i> Pre-Assessment</h1>
        <p>Test your knowledge of Fourier's Law before starting the simulation.</p>
    </header>

    <div id="quiz-area">
        </div>

    <button id="finish-btn" class="btn-submit" style="display:none;" onclick="showFinalResult()">
        View Final Results <i class="fas fa-chevron-right" style="margin-left: 10px;"></i>
    </button>

    <div id="result-modal">
        <h2 id="result-title"></h2>
        <div class="score-circle" id="result-score-text"></div>
        <p id="result-comment" style="font-size: 1.2rem; color: #555; margin-bottom: 30px;"></p>
        <button class="btn-submit" onclick="location.reload()">
            <i class="fas fa-redo" style="margin-right: 10px;"></i> Retake Assessment
        </button>
    </div>
</div>

<script>
// ... (Keeping your existing 'questions' array logic) ...
const questions = [
    { q: "According to Fourier’s Law, how is the heat flux related to the temperature gradient?", options: ["Inversely proportional", "Proportional to the square", "Proportional to the negative gradient", "Independent of the gradient"], correct: 2 },
    { q: "What does the negative sign in the Fourier equation signify?", options: ["Negative thermal conductivity", "Heat flows toward higher temperature", "Heat flows toward lower temperature", "Energy loss to surroundings"], correct: 2 },
    { q: "Thermal Conductivity (k) is best defined as:", options: ["Total heat stored", "Rate of temperature change", "Intrinsic property of energy transfer efficiency", "Geometric area of flow"], correct: 2 },
    { q: "A 'Steady State' condition in heat conduction means:", options: ["Heat flow has stopped", "Temperature at any point is constant over time", "Temperature is uniform everywhere", "Material is melting"], correct: 1 },
    { q: "Why is the radial heat flow solution in cylinders logarithmic?", options: ["Temperature is constant", "Conductivity changes with radius", "Surface area changes with radius", "It's a curved surface"], correct: 2 },
    { q: "Which are the primary heat carriers in solids at a microscopic level?", options: ["Protons and neutrons", "Phonons and free electrons", "Photons and radio waves", "Molecules in empty space"], correct: 1 },
    { q: "Fourier's Law may fail under which condition?", options: ["In metal rods", "At the nanoscale or high-frequency pulses", "In 1D systems", "When area is constant"], correct: 1 },
    { q: "In radial flow, what do x0 and x1 represent?", options: ["Initial and final time", "Inner and outer radii", "Surface temperatures", "Material thickness"], correct: 1 },
    { q: "What is meant by an 'empirical principle'?", options: ["Purely mathematical", "Based on experimental observation", "Only for simulations", "Proven incorrect"], correct: 1 },
    { q: "If the temperature gradient becomes steeper, the heat flow rate:", options: ["Decreases", "Increases linearly", "Remains same", "Becomes zero"], correct: 1 }
];

let score = 0;
let answeredCount = 0;

function initQuiz() {
    const quizArea = document.getElementById('quiz-area');
    questions.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = `quiz-card q-${index + 1}`;
        card.style.animationDelay = `${index * 0.1}s`; // Dynamic staggered delay
        card.innerHTML = `
            <div class="question"><span class="q-num">Q${index + 1}.</span> ${item.q}</div>
            <div class="options-list" id="q${index}-options">
                ${item.options.map((opt, i) => `
                    <div class="option-item">
                        <button class="option-btn" onclick="checkAnswer(${index}, ${i}, this)">${opt}</button>
                    </div>
                `).join('')}
            </div>
        `;
        quizArea.appendChild(card);
    });
}

function checkAnswer(qIdx, selectedIdx, btn) {
    const correctIdx = questions[qIdx].correct;
    const optionsContainer = document.getElementById(`q${qIdx}-options`);
    const buttons = optionsContainer.getElementsByTagName('button');

    for (let b of buttons) { b.disabled = true; }

    if (selectedIdx === correctIdx) {
        btn.classList.add('correct');
        score += 1;
    } else {
        btn.classList.add('wrong');
        buttons[correctIdx].classList.add('correct'); 
    }

    answeredCount++;
    if (answeredCount === questions.length) {
        setTimeout(() => {
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            document.getElementById('finish-btn').style.display = 'block';
        }, 300);
    }
}

function showFinalResult() {
    document.getElementById('quiz-area').style.display = 'none';
    document.getElementById('finish-btn').style.display = 'none';
    document.getElementById('quiz-header').style.display = 'none';
    
    const modal = document.getElementById('result-modal');
    const title = document.getElementById('result-title');
    const scoreText = document.getElementById('result-score-text');
    const comment = document.getElementById('result-comment');
    
    modal.style.display = 'block';
    scoreText.innerText = `${score}/10`;

    if (score >= 9) {
        title.innerHTML = "🏆 Excellent!";
        comment.innerText = "Fantastic! You've mastered the theoretical concepts of Fourier's Law.";
    } else if (score >= 7) {
        title.innerHTML = "👏 Great Job!";
        comment.innerText = "You have a very strong understanding of heat conduction principles.";
    } else {
        title.innerHTML = "📚 Keep Learning";
        comment.innerText = "Review the theory section once more to reach a perfect score.";
    }
}

window.onload = initQuiz;
</script>
</body>
</html>
